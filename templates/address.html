{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

<h2 class="mb-4">📍 Delivery Address</h2>

<!-- ✅ SAVED ADDRESSES -->
{% if saved_addresses %}
<h4>Saved Addresses</h4>

{% for addr in saved_addresses %}

<div class="card p-3 mb-3 shadow-sm">

    <strong>{{ addr.full_name }}</strong><br>
    {{ addr.address_line }}<br>
    {{ addr.city }} - {{ addr.pincode }}<br>
    📞 {{ addr.phone }}

    <div class="mt-2">

        <!-- ✅ Use Address -->
        <button class="btn btn-outline-primary btn-sm"
            onclick="fillAddress('{{ addr.full_name }}','{{ addr.phone }}','{{ addr.address_line }}','{{ addr.city }}','{{ addr.pincode }}')">
            Use
        </button>

        <!-- ✅ Edit Address -->
        <a href="{{ url_for('edit_address', address_id=addr.id) }}"
           class="btn btn-warning btn-sm">
           ✏️ Edit
        </a>
     
<form action="{{ url_for('delete_address', address_id=addr.id) }}" method="POST" style="display:inline;">
        <button class="btn btn-danger btn-sm"
                onclick="return confirm('Are you sure you want to delete this address?')">
            🗑 Delete
        </button>
    </form>


    </div>

</div>

{% endfor %}
{% endif %}
<hr>



<!-- ✅ ADDRESS FORM -->
<form method="POST" class="card p-4 shadow">

    <div class="row">
        <div class="col-md-6 mb-3">
            <label>Full Name</label>
            <input type="text" name="name" id="name" class="form-control" required>
        </div>

        <div class="col-md-6 mb-3">
            <label>Phone</label>
            <input type="text" name="phone" id="phone" class="form-control" required>
        </div>
    </div>

    <div class="mb-3">
        <label>Address</label>
        <textarea name="address" id="address" class="form-control" required></textarea>
    </div>

    <div class="row">
        <div class="col-md-6 mb-3">
            <label>City</label>
            <input type="text" name="city" id="city" class="form-control" required>
        </div>

        <div class="col-md-6 mb-3">
            <label>Pincode</label>
            <input type="text" name="pincode" id="pincode" class="form-control" required>
        </div>
    </div>

    <!-- ✅ SAVE OPTION -->
    <div class="form-check mb-3">
        <input type="checkbox" name="save_address" class="form-check-input">
        <label class="form-check-label">Save for future use</label>
    </div>

    <button type="submit" class="btn btn-success w-100">
        🚚 Place Order
    </button>

</form>

</div>

<!-- ✅ JS TO AUTO-FILL ADDRESS -->
<script>
function fillAddress(name, phone, address, city, pincode) {
    document.getElementById("name").value = name;
    document.getElementById("phone").value = phone;
    document.getElementById("address").value = address;
    document.getElementById("city").value = city;
    document.getElementById("pincode").value = pincode;
}
</script>

{% endblock %}
