{% extends "base.html" %}
{% block content %}
<div class="container py-5 text-center">
  <h2 class="mb-4">🛒 Checkout</h2>

  <div class="card mx-auto shadow-sm p-4" style="max-width: 600px;">
    <h4 class="mb-3">Your Pending Orders</h4>

    {% for order in orders %}
      <div class="border-bottom py-2">
        <p class="fw-semibold">{{ order.product.name }}</p>
        <p class="text-muted">Price: ₹{{ order.total_price }}</p>
      </div>
    {% endfor %}

    <h5 class="mt-3 fw-bold">Total: ₹{{ total_price }}</h5>

    <form method="post">
      <button type="submit" class="btn btn-success mt-4 px-5 py-2">
        💳 Pay Now
      </button>
    </form>
  </div>
</div>
{% endblock %}
