{% extends "base.html" %}

{% block content %}

<div class="container mt-5">
  <div class="col-md-6 mx-auto">

    <div class="card shadow p-4">
      <h3 class="mb-3">✏️ Edit Address</h3>

      <form method="POST">

        <div class="mb-3">
          <label>Full Name</label>
          <input type="text" name="name" class="form-control" value="{{ address.full_name }}" required>
        </div>

        <div class="mb-3">
          <label>Phone</label>
          <input type="text" name="phone" class="form-control" value="{{ address.phone }}" required>
        </div>

        <div class="mb-3">
          <label>Address</label>
          <textarea name="address" class="form-control" required>{{ address.address_line }}</textarea>
        </div>

        <div class="mb-3">
          <label>City</label>
          <input type="text" name="city" class="form-control" value="{{ address.city }}" required>
        </div>

        <div class="mb-3">
          <label>Pincode</label>
          <input type="text" name="pincode" class="form-control" value="{{ address.pincode }}" required>
        </div>

        <button class="btn btn-success w-100">Update Address</button>

      </form>
    </div>

  </div>
</div>

{% endblock %}
