{% extends "base.html" %}
{% block content %}

<div class="container mt-5">
  <h3>💳 Select Payment Method</h3>

  <form method="POST">

    <div class="form-check">
      <input class="form-check-input" type="radio" name="payment_mode" value="COD" required>
      <label class="form-check-label">Cash on Delivery</label>
    </div>

    <div class="form-check">
      <input class="form-check-input" type="radio" name="payment_mode" value="Online">
      <label class="form-check-label">Online Payment</label>
    </div>

    <button class="btn btn-success mt-3">Proceed</button>

  </form>
</div>

{% endblock %}
