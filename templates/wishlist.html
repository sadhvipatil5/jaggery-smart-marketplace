{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
  <h2 class="text-center mb-4">❤️ Your Wishlist</h2>

  {% if wishlist_items %}
  <div class="row">
    {% for item in wishlist_items %}
    <div class="col-md-4 mb-4">
      <div class="card shadow-sm">
        <img src="{{ item.product.image_url or 'https://via.placeholder.com/300' }}" class="card-img-top" alt="{{ item.product.name }}">
        <div class="card-body text-center">
          <h5 class="card-title">{{ item.product.name }}</h5>
          <p class="text-muted">₹{{ item.product.price }}</p>

          <form action="{{ url_for('remove_from_wishlist', item_id=item.id) }}" method="POST" class="d-inline">
            <button type="submit" class="btn btn-danger btn-sm">Remove ❌</button>
          </form>

          <form action="{{ url_for('add_to_cart', product_id=item.product.id) }}" method="POST" class="d-inline">
            <button type="submit" class="btn btn-success btn-sm">Add to Cart 🛒</button>
          </form>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
  {% else %}
  <div class="alert alert-info text-center">
    Your wishlist is empty ❤️
  </div>
  {% endif %}
</div>
{% endblock %}
